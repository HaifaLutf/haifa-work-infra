apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flux-system
  labels:
    app: flask-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: haifa-flask-app:v2  # Your new image!
        imagePullPolicy: Never    # Tells K8s to look locally first
        ports:
        - containerPort: 5000
        env:
        - name: MYSQL_HOST
          value: "mysql"
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-db-pass # Reusing your SealedSecret!
              key: password
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: flux-system
spec:
  selector:
    app: flask-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
